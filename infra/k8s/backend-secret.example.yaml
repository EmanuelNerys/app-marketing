# ============================================================
# Secret do backend — copie para backend-secret.yaml e preencha.
# NÃO commite o backend-secret.yaml (contém segredos).
#
# Crie preferencialmente via kubectl (não versiona valores):
#   kubectl -n adstudioai create secret generic backend-env \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://user:pass@host:5432/db' \
#     --from-literal=FERNET_KEY='...' \
#     --from-literal=SECRET_KEY='...' \
#     --from-literal=META_APP_ID='...' \
#     --from-literal=META_APP_SECRET='...' \
#     --from-literal=IG_APP_ID='...' \
#     --from-literal=IG_APP_SECRET='...'
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-env
  namespace: adstudioai
type: Opaque
stringData:
  # Banco externo gerenciado (Supabase/Neon/Render)
  DATABASE_URL: "postgresql+asyncpg://USER:PASS@HOST:5432/DBNAME"

  # Criptografia / sessão — use os MESMOS valores do ambiente atual
  # para não invalidar tokens/sessões existentes.
  FERNET_KEY: "SUBSTITUA"
  SECRET_KEY: "SUBSTITUA"

  # Meta / Instagram
  META_APP_ID: "SUBSTITUA"
  META_APP_SECRET: "SUBSTITUA"
  META_API_VERSION: "v21.0"
  META_WEBHOOK_VERIFY_TOKEN: "SUBSTITUA"
  IG_APP_ID: "SUBSTITUA"
  IG_APP_SECRET: "SUBSTITUA"

  # URLs públicas (ajuste para o domínio real de produção)
  APP_URL: "https://SEU_FRONTEND"
  PUBLIC_BASE_URL: "https://SEU_BACKEND"
  CORS_ORIGINS: '["https://SEU_FRONTEND"]'
