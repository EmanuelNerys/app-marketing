apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: adstudioai
  labels:
    app: adstudioai
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adstudioai
      component: backend
  template:
    metadata:
      labels:
        app: adstudioai
        component: backend
    spec:
      containers:
        - name: backend
          # Troque pela sua imagem no OCIR:
          #   <region-key>.ocir.io/<namespace>/adstudioai-backend:<tag>
          # ex: gru.ocir.io/grxxxxxxx/adstudioai-backend:latest
          image: REGION_KEY.ocir.io/NAMESPACE/adstudioai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-env
          env:
            - name: UVICORN_WORKERS
              value: "2"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
      # Imagem privada no OCIR precisa deste secret (ver README):
      #   kubectl -n adstudioai create secret docker-registry ocir-secret ...
      imagePullSecrets:
        - name: ocir-secret
