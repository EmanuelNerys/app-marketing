# fly.toml app configuration file generated for adstudioai-backend on 2026-07-13T23:53:10-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'adstudioai-backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_HOST = '0.0.0.0'
  APP_NAME = 'adStudioAI'
  APP_PORT = '8000'
  DEBUG = 'False'
  META_API_VERSION = 'v21.0'
  UVICORN_WORKERS = '1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
