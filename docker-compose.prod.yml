# ============================================================
# Overlay de produção (Oracle VM) — adiciona o Caddy na frente
# com HTTPS automático. Suba com:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requer a variável DOMAIN no .env (ex.: DOMAIN=seuapp.duckdns.org)
# e as portas 80/443 abertas (Security List da OCI + firewall do Ubuntu).
# ============================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: adstudioai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
